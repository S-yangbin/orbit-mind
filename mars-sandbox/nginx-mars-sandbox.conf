# mars-sandbox nginx config
# nginx serves as reverse proxy in front of uvicorn
# Video files are served directly by nginx from OSS mount

server {
    listen 8888;
    server_name _;
    client_max_body_size 2G;

    # Direct OSS video file serving (used via X-Accel-Redirect from backend)
    location /video-files/ {
        internal;
        alias /mnt/oss-sybuddy/videos/;
    }

    # WebSocket
    location /ws/ {
        proxy_pass http://127.0.0.1:8889;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API proxy to uvicorn
    location /api/ {
        proxy_pass http://127.0.0.1:8889;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # Frontend static files
    location / {
        root /opt/mars-sandbox/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}