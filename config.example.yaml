# Home Agent 配置示例
# 复制此文件为 config.yaml 并填入真实值
# 环境变量优先级高于配置文件

mns:
  endpoint: "https://{account-id}.mns.{region}.aliyuncs.com"
  access_key_id: "your-ak"           # 或 env: ALIBABA_CLOUD_ACCESS_KEY_ID
  access_key_secret: "your-sk"       # 或 env: ALIBABA_CLOUD_ACCESS_KEY_SECRET
  queue_name: "home-hub-queue"       # 单队列，或 env: MNS_QUEUE_NAME

agent:
  max_timeout: 120                   # 命令最大执行时间（秒）
  allowed_commands: []               # 白名单（空则不限制）
  blocked_commands:                  # 黑名单
    - "rm -rf /"
    - "rm -rf /*"
    - "mkfs"
    - "dd if=/dev/zero of=/dev"
    - ":(){ :|:& };:"
  working_dir: "~"                   # 默认工作目录
  log_file: null                     # 日志文件路径，null 输出到 stdout
  audit_log_dir: null                # 审计日志目录，null 默认 ~/orbit-mind/logs/
